lidar_odometry_node:
  ros__parameters:
    # Sensor
    sensor: "ouster"
    n_scan: 64
    horizon_scan: 512
    downsample_rate: 1
    lidar_min_range: 1.0
    lidar_max_range: 1000.0

    # Feature extraction
    edge_threshold: 1.0
    surf_threshold: 0.1
    edge_feature_min_valid_num: 10
    surf_feature_min_valid_num: 100

    # Voxel filter
    corner_leaf_size: 0.2
    surf_leaf_size: 0.4

    # Optimization
    max_iterations: 30
    degeneracy_threshold: 100.0
    degeneracy_covariance: 1.0e+4

    # Keyframe
    keyframe_dist_threshold: 1.0
    keyframe_angle_threshold: 0.2
    max_local_map_keyframes: 50

    # CPU
    num_threads: 4

    # Frames
    lidar_frame: "lidar_link"
    odom_frame: "odom"
    publish_tf: true

    # Extrinsic calibration: LiDAR → Vehicle
    lidar_to_vehicle_translation: [0.0, 0.0, 0.0]  # [x, y, z] in meters
    lidar_to_vehicle_rotation: [0.0, 0.0, 0.0]      # [roll, pitch, yaw] in radians
    vehicle_frame: "base_link"
