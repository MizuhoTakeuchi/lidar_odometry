lidar_odometry:
  ros__parameters:
    input_topic: "/velodyne_points"

    # NDT parameters
    ndt_resolution: 2.0
    ndt_step_size: 0.01
    ndt_max_iterations: 30
    ndt_epsilon: 0.01
    ndt_num_threads: 4
    ndt_search_method: "DIRECT7"

    # Point cloud filtering
    voxel_leaf_size: 0.25
    min_scan_range: 1.0
    max_scan_range: 100.0

    # Local map parameters
    local_map_size: 15                  # Number of keyframes to keep in local map
    local_map_voxel_size: 0.5           # Voxel size for local map downsampling [m]
    local_map_keyframe_distance: 0.5    # Min translation to register new keyframe [m]
    local_map_keyframe_angle: 0.1       # Min rotation to register new keyframe [rad]

    # IMU fusion
    imu_topic: "/imu/data"
    use_imu_prediction: true            # Use IMU for NDT initial guess

    # Frame IDs
    odom_frame_id: "odom"
    base_frame_id: "base_link"

    # LiDAR to vehicle extrinsic calibration [m, rad]
    lidar_to_vehicle_x: 0.0
    lidar_to_vehicle_y: 0.0
    lidar_to_vehicle_z: 0.0
    lidar_to_vehicle_roll: 0.0
    lidar_to_vehicle_pitch: 0.0
    lidar_to_vehicle_yaw: 0.0

    # Covariance estimation
    base_translation_variance: 0.01
    base_rotation_variance: 0.001
    score_scale_factor: 1.0
